<!DOCTYPE html>
<html>
<head>
    <title>Latvia River Levels</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { padding: 0; margin: 0; }
        #map { height: 100vh; width: 100vw; }
        .popup-custom { font-family: Arial, sans-serif; }
        .popup-custom h3 { margin-top: 0; margin-bottom: 5px; color: #333; }
        .popup-custom p { margin: 2px 0; color: #555; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map centered on Latvia
        var map = L.map('map').setView([56.8796, 24.6032], 7);

        // Add a modern grayscale basemap (CartoDB Positron)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Fetch the scraped data and add markers
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(station => {
                    var marker = L.marker([station.lat, station.lon]).addTo(map);
                    
                    var popupContent = `
                        <div class="popup-custom">
                            <h3>${station.name}</h3>
                            <p><strong>Laiks:</strong> ${station.date}</p>
                            <p><strong>Līmenis:</strong> ${station.water_level}</p>
                            <p><strong>Temp:</strong> ${station.temperature}</p>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                });
            })
            .catch(error => console.error('Error loading data:', error));
    </script>
</body>
</html>
